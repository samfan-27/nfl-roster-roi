name: ETL - roster_roi update

on:
  workflow_dispatch:
  schedule:
    # Runs at 03:00 UTC every Tuesday (captures Monday Night Football)
    - cron: '0 3 * * 2'

jobs:
  etl:
    runs-on: ubuntu-latest
    # Define secrets once here; they apply to all steps automatically
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Sanity import test
        run: |
          python - <<'PY'
          import importlib
          for p in ("nflreadpy","polars","pandas","supabase","loguru"):
              importlib.import_module(p)
          print("imports ok")
          PY

      - name: Run ETL
        working-directory: .
        run: |
          python etl/etl.py --season 2025 --min-snaps 100 --output ./artifacts/roster_roi_2025.csv

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roster-roi-artifacts
          path: artifacts/*.csv
